name: Android Example Release Build

on:
  workflow_dispatch:

  push:
    branches:
      - main
      - master
    tags:
      - "v*"
    paths:
      - "examples/android-example/**"
      - ".github/workflows/android-example-release.yml"

  pull_request:
    paths:
      - "examples/android-example/**"
      - ".github/workflows/android-example-release.yml"

concurrency:
  group: android-example-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-release:
    name: Build Android release APK
    runs-on: ubuntu-latest

    permissions:
      contents: read

    defaults:
      run:
        working-directory: examples/android-example

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build release APK
        run: ./gradlew --no-daemon assembleRelease

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-example-release-apk
          path: examples/android-example/**/build/outputs/apk/release/*.apk
          if-no-files-found: error

      - name: Upload ProGuard/R8 mapping artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: android-example-release-mapping
          path: examples/android-example/**/build/outputs/mapping/release/mapping.txt
          if-no-files-found: ignore

  github-release:
    name: Publish APK to GitHub Release
    runs-on: ubuntu-latest
    needs: build-release

    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - name: Download release APK artifact
        uses: actions/download-artifact@v4
        with:
          name: android-example-release-apk
          path: release-artifacts

      - name: Create GitHub Release and upload APK
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG_NAME="${GITHUB_REF_NAME}"

          shopt -s nullglob
          APK_FILES=(release-artifacts/*.apk)

          if [ ${#APK_FILES[@]} -eq 0 ]; then
            echo "No APK files found."
            exit 1
          fi

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" "${APK_FILES[@]}" --clobber
          else
            gh release create "$TAG_NAME" "${APK_FILES[@]}" \
              --title "$TAG_NAME" \
              --notes "Android example release build."
          fi
