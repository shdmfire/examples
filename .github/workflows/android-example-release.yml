name: Android Example Release Build

on:
  workflow_dispatch:

  push:
    branches:
      - main
      - master
    tags:
      - "v*"
    paths:
      - "android-example/**"
      - ".github/workflows/android-example-release.yml"

  pull_request:
    paths:
      - "android-example/**"
      - ".github/workflows/android-example-release.yml"

concurrency:
  group: android-example-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-release:
    name: Build Android release APK
    runs-on: ubuntu-latest

    permissions:
      contents: read

    defaults:
      run:
        working-directory: ./android-example

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Setup Android Signing
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ] || [ -z "$KEY_ALIAS" ] || [ -z "$STORE_PASSWORD" ] || [ -z "$KEY_PASSWORD" ]; then
            echo "Android signing secrets are incomplete; building unsigned release APK."
            exit 0
          fi

          echo "$KEYSTORE_BASE64" | base64 --decode > app/release.jks
          echo "RELEASE_STORE_FILE=release.jks" >> local.properties
          echo "RELEASE_KEY_ALIAS=$KEY_ALIAS" >> local.properties
          echo "RELEASE_STORE_PASSWORD=$STORE_PASSWORD" >> local.properties
          echo "RELEASE_KEY_PASSWORD=$KEY_PASSWORD" >> local.properties

      - name: Build release APK
        run: ./gradlew --no-daemon assembleRelease

      - name: Collect APK files
        run: |
          mkdir -p "$GITHUB_WORKSPACE/release-artifacts"

          find . -type f -path "*/build/outputs/apk/*/release/*.apk" -print -exec cp {} "$GITHUB_WORKSPACE/release-artifacts/" \;
          find . -type f -path "*/build/outputs/apk/release/*.apk" -print -exec cp {} "$GITHUB_WORKSPACE/release-artifacts/" \;

          echo "Collected APK files:"
          ls -lah "$GITHUB_WORKSPACE/release-artifacts"

          test -n "$(find "$GITHUB_WORKSPACE/release-artifacts" -maxdepth 1 -name '*.apk' -print -quit)"

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-example-release-apk
          path: release-artifacts/*.apk
          if-no-files-found: error

      - name: Upload ProGuard/R8 mapping artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: android-example-release-mapping
          path: android-example/**/build/outputs/mapping/**/release/mapping.txt
          if-no-files-found: ignore

  github-release:
    name: Publish APK to GitHub Release
    runs-on: ubuntu-latest
    needs: build-release

    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - name: Download release APK artifact
        uses: actions/download-artifact@v4
        with:
          name: android-example-release-apk
          path: release-artifacts

      - name: Create GitHub Release and upload APK
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          shopt -s nullglob
          APK_FILES=(release-artifacts/*.apk)

          if [ ${#APK_FILES[@]} -eq 0 ]; then
            echo "No APK files found."
            exit 1
          fi

          echo "Publishing APK files:"
          printf '%s\n' "${APK_FILES[@]}"

          if gh release view "$TAG_NAME" --repo "$REPO" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" "${APK_FILES[@]}" \
              --repo "$REPO" \
              --clobber
          else
            gh release create "$TAG_NAME" "${APK_FILES[@]}" \
              --repo "$REPO" \
              --title "$TAG_NAME" \
              --notes "Android example release build." \
              --verify-tag
          fi
